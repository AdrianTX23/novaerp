name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=web
      - run: npm run build --workspace=web

  api:
    name: API (build, test)
    runs-on: ubuntu-latest
    # NovaERP.IntegrationTests levanta la app real vía WebApplicationFactory y
    # aplica las migraciones contra este Postgres — mismas credenciales que
    # docker-compose.yml para que appsettings.Development.json funcione sin
    # overrides.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: novaerp
          POSTGRES_USER: novaerp
          POSTGRES_PASSWORD: novaerp_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U novaerp -d novaerp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    # En local el signing key sale de `dotnet user-secrets` (fuera del repo, a
    # propósito). CI no tiene esos user-secrets, y Jwt:SigningKey está vacío en
    # appsettings.json, así que la validación de arranque (ValidateOnStart)
    # tumbaba el host de NovaErpWebApplicationFactory antes de correr un solo
    # test de integración. Esta clave es solo para firmar JWTs efímeros contra
    # el Postgres desechable del runner — no protege nada real.
    env:
      Jwt__SigningKey: "ci-only-signing-key-not-a-real-secret-1234567890"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - run: dotnet restore apps/api/NovaERP.sln
      - run: dotnet build apps/api/NovaERP.sln --no-restore --configuration Release
      - run: dotnet test apps/api/NovaERP.sln --no-build --configuration Release
