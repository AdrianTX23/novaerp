services:
  postgres:
    image: postgres:17-alpine
    container_name: novaerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novaerp
      POSTGRES_USER: novaerp
      POSTGRES_PASSWORD: novaerp_dev
    ports:
      - "5432:5432"
    volumes:
      - novaerp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novaerp -d novaerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: novaerp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  novaerp-postgres-data:
